name: Ping Local Kline Service

on:
  schedule:
    - cron: '*/10 * * * *'  # 每10分钟执行一次（UTC时间）
  workflow_dispatch:        # 支持手动触发

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Curl Kline Health Endpoint
        run: |
          curl -s -o /dev/null -w "%{http_code}" http://localhost:10000/healthz
