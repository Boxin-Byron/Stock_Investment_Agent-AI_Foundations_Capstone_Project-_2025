# version: '3.8'
# name: stock-investment-agent

services:
  monitor:
    build:
      context: ./monitor
      dockerfile: Dockerfile
    ports:
      # - "127.0.0.1:5001:5001"
      - "5001:5001"  # 允许外部访问
    environment:
      DIFY_FLOW_API_KEY: ${DIFY_FLOW_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      PORT: 5001
      # 设置 FastAPI 和 Uvicorn 日志级别
      LOG_LEVEL: "DEBUG"
      UVICORN_LOG_LEVEL: "debug"
      DB_PATH: "/app/data/user_preferences.db"  # 修改为项目目录内的路径
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]  # 使用代码中的健康检查端点
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    # 新增：将主机上的用户数据目录挂载到容器内
    volumes:
      # 关键修改：挂载本地目录到容器中
      - ./monitor/data:/app/data  # 容器内部的 /app/data 映射到本地的 ./monitor/data
    # 防止数据丢失的额外挂载
      - ./monitor/config:/app/config
      - ./monitor/local-dependencies:/app/local-dependencies
    # 添加重启策略
    restart: unless-stopped
    networks:
      - stock-network  # 显式加入网络

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      # - "127.0.0.1:7860:7860"
      - "7860:7860"  # 允许外部访问
    environment:
      DIFY_HOST: "http://monitor:5001"  # 使用内部DNS访问监控服务
      USE_MOCK_DATA: "false"  # 添加模拟模式开关
      PYTHONUNBUFFERED: 1
      GRADIO_SERVER_NAME: "0.0.0.0"
    depends_on:
      monitor:
        condition: service_healthy  # 依赖健康状态
    volumes:
      # 添加只读访问数据库
      - ./monitor/data:/data:ro
      - ./app/user_data:/app/user_data
      - ./app/config:/app/config
    networks:
      - stock-network  # 显式加入网络
    # 添加重启策略
    restart: unless-stopped

networks:
  stock-network:
    driver: bridge
