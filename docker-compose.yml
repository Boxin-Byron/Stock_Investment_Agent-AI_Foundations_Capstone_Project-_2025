# version: '3.8'

services:
  monitor:
    build:
      context: ./monitor
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:5001:5001"
    environment:
      PORT: 5001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    # 添加重启策略
    restart: unless-stopped
  
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:7860:7860"
    environment:
      DIFY_HOST: "http://monitor:5001"  # 修正：使用服务名进行容器间通信
      GRADIO_SERVER_NAME: "0.0.0.0"
    depends_on:
      monitor:
        condition: service_healthy
    # 添加重启策略
    restart: unless-stopped
    volumes:
      - type: bind
        source: ./app/data
        target: /app/data
      - type: bind
        source: ./app/config
        target: /app/config

# 修改网络配置（Windows 专用）
networks:
  default:
    name: stock-network
   # driver: nat  # 移除这个，在 Windows 上不需要显式指定
