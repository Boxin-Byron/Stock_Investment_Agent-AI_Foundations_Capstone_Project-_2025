# version: '3.8'
# name: stock-investment-agent

services:
  monitor:
    build:
      context: ./monitor
      dockerfile: Dockerfile
    ports:
      # - "127.0.0.1:5001:5001"
      - "5001:5001"  # 允许外部访问
    environment:
      DIFY_FLOW_API_KEY: "app-Pmqm52DKmWlzsTi07I3uQbSn"
      DEEPSEEK_API_KEY: "sk-653829eacd30417996f70834039c0414" 
      PORT: 5001
      # 设置 FastAPI 和 Uvicorn 日志级别
      LOG_LEVEL: "DEBUG"
      UVICORN_LOG_LEVEL: "debug"
      # 新增：设置用户数据路径的环境变量
      USER_DATA_PATH: "/monitor/user_data"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]  # 使用代码中的健康检查端点
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    # 新增：将主机上的用户数据目录挂载到容器内
    volumes:
      - ./app/user_data:/monitor/user_data:ro # "ro" 表示只读挂载
    # 添加重启策略
    restart: unless-stopped
    networks:
      - stock-network  # 显式加入网络

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      # - "127.0.0.1:7860:7860"
      - "7860:7860"  # 允许外部访问
    environment:
      DIFY_HOST: "http://monitor:5001"  # 使用内部DNS访问监控服务
      USE_MOCK_DATA: "false"  # 添加模拟模式开关
      PYTHONUNBUFFERED: 1
      GRADIO_SERVER_NAME: "0.0.0.0"
    depends_on:
      monitor:
        condition: service_healthy  # 依赖健康状态
    volumes:
      - ./app/user_data:/app/user_data  # 持久化用户数据
      - ./app/config:/app/config
    networks:
      - stock-network  # 显式加入网络
    # 添加重启策略
    restart: unless-stopped

networks:
  stock-network:
    driver: bridge
  # stock-network:  # 明确定义网络
  #   driver: bridge
